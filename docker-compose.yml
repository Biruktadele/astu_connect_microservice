services:
  # ── Infrastructure ──────────────────────────────────────────────

  identity-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: identity_user
      POSTGRES_PASSWORD: id_Pass2024xQ
      POSTGRES_DB: identity_db
    volumes: [ identity_data:/var/lib/postgresql/data ]
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U identity_user -d identity_db" ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 40s
    networks: [ astu ]

  feed-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: feed_user
      POSTGRES_PASSWORD: fd_Pass2024xQ
      POSTGRES_DB: feed_db
    volumes: [ feed_data:/var/lib/postgresql/data ]
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U feed_user -d feed_db" ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 40s
    networks: [ astu ]

  community-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: community_user
      POSTGRES_PASSWORD: cm_Pass2024xQ
      POSTGRES_DB: community_db
    volumes: [ community_data:/var/lib/postgresql/data ]
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U community_user -d community_db" ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 40s
    networks: [ astu ]

  notification-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: notification_user
      POSTGRES_PASSWORD: nt_Pass2024xQ
      POSTGRES_DB: notification_db
    volumes: [ notification_data:/var/lib/postgresql/data ]
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U notification_user -d notification_db" ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 40s
    networks: [ astu ]

  gamification-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: gamification_user
      POSTGRES_PASSWORD: gm_Pass2024xQ
      POSTGRES_DB: gamification_db
    volumes: [ gamification_data:/var/lib/postgresql/data ]
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U gamification_user -d gamification_db" ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 40s
    networks: [ astu ]

  cassandra:
    image: cassandra:4.1
    volumes: [ cassandra_data:/var/lib/cassandra ]
    environment:
      CASSANDRA_CLUSTER_NAME: astu-chat
      HEAP_NEWSIZE: 128M
      MAX_HEAP_SIZE: 512M
    healthcheck:
      test: [ "CMD", "cqlsh", "-e", "describe keyspaces" ]
      interval: 15s
      timeout: 10s
      retries: 15
      start_period: 60s
    networks: [ astu ]

  redis-feed:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes: [ redis_feed_data:/data ]
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5
    networks: [ astu ]

  redis-chat:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes: [ redis_chat_data:/data ]
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5
    networks: [ astu ]

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks: [ astu ]

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    depends_on: [ zookeeper ]
    ports: [ "9092:9092", "29092:29092" ]
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: [ "CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092" ]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 45s
    networks: [ astu ]

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=true
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
      - "ES_JAVA_OPTS=-Xms256m -Xmx256m"
    volumes: [ es_data:/usr/share/elasticsearch/data ]
    healthcheck:
      test: [ "CMD-SHELL", "curl -sf -u elastic:${ELASTIC_PASSWORD} http://localhost:9200/_cluster/health | grep -qE '\"status\":\"(green|yellow)\"'" ]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 90s
    networks: [ astu ]

  minio:
    image: minio/minio:RELEASE.2024-11-07T00-52-20Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    ports: [ "9001:9001" ] # console only; API is internal
    volumes: [ minio_data:/data ]
    healthcheck:
      test: [ "CMD", "mc", "ready", "local" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [ astu ]

  # ── Application Services ────────────────────────────────────────

  identity-service:
    build: ./identity_service
    env_file: [ .env ]
    depends_on:
      identity-db: { condition: service_healthy }
      kafka: { condition: service_healthy }
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/live')" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.5"
    networks: [ astu ]

  feed-service:
    build: ./feed_service
    env_file: [ .env ]
    depends_on:
      feed-db: { condition: service_healthy }
      kafka: { condition: service_healthy }
      redis-feed: { condition: service_healthy }
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.5"
    networks: [ astu ]

  chat-service:
    build: ./chat_service
    env_file: [ .env ]
    depends_on:
      cassandra: { condition: service_healthy }
      kafka: { condition: service_healthy }
      redis-chat: { condition: service_healthy }
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.5"
    networks: [ astu ]

  community-service:
    build: ./community_service
    env_file: [ .env ]
    depends_on:
      community-db: { condition: service_healthy }
      kafka: { condition: service_healthy }
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.5"
    networks: [ astu ]

  notification-service:
    build: ./notification_service
    env_file: [ .env ]
    depends_on:
      notification-db: { condition: service_healthy }
      kafka: { condition: service_healthy }
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.25"
    networks: [ astu ]

  media-service:
    build: ./media_service
    env_file: [ .env ]
    depends_on:
      minio: { condition: service_healthy }
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.5"
    networks: [ astu ]

  search-service:
    build: ./search_service
    env_file: [ .env ]
    depends_on:
      elasticsearch: { condition: service_healthy }
      kafka: { condition: service_healthy }
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.25"
    networks: [ astu ]

  gamification-service:
    build: ./gamification_service
    env_file: [ .env ]
    depends_on:
      gamification-db: { condition: service_healthy }
      kafka: { condition: service_healthy }
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.25"
    networks: [ astu ]

  api-gateway:
    build: ./api_gateway
    env_file: [ .env ]
    volumes:
      - "./astuconnect_web:/app/web:ro"
      - "./admin_web:/app/admin_web:ro"
    depends_on:
      identity-service: { condition: service_healthy }
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.5"
    networks: [ astu ]

  caddy:
    image: caddy:2-alpine
    ports: [ "80:80", "443:443" ]
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on: [ api-gateway ]
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: "0.25"
    networks: [ astu ]

networks:
  astu:
    driver: bridge

volumes:
  identity_data:
  feed_data:
  community_data:
  notification_data:
  cassandra_data:
  redis_feed_data:
  redis_chat_data:
  es_data:
  gamification_data:
  minio_data:
  caddy_data:
  caddy_config:
