<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ASTU Connect Admin — Login</title>
<link rel="stylesheet" href="css/admin.css">
</head>
<body class="login-page">
<div class="login-card">
  <h1>ASTU Connect</h1>
  <p class="subtitle">Admin Panel</p>
  <form id="loginForm">
    <input type="email" id="email" placeholder="Email" required>
    <input type="password" id="password" placeholder="Password" required>
    <button type="submit">Sign In</button>
    <p id="loginError" class="error-msg"></p>
  </form>
</div>
<script>
const API = window.location.origin;
document.getElementById('loginForm').addEventListener('submit', async e => {
  e.preventDefault();
  const err = document.getElementById('loginError');
  err.textContent = '';
  try {
    const res = await fetch(`${API}/api/v1/auth/login`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        email: document.getElementById('email').value,
        password: document.getElementById('password').value
      })
    });
    const data = await res.json();
    if (!res.ok) { err.textContent = data.detail || 'Login failed'; return; }
    const payload = JSON.parse(atob(data.access_token.split('.')[1]));
    if (!payload.roles || !payload.roles.includes('admin')) {
      err.textContent = 'You do not have admin privileges';
      return;
    }
    localStorage.setItem('admin_token', data.access_token);
    localStorage.setItem('admin_refresh', data.refresh_token);
    window.location.href = 'dashboard.html';
  } catch(ex) {
    err.textContent = 'Network error';
  }
});
if (localStorage.getItem('admin_token')) window.location.href = 'dashboard.html';
</script>
</body>
</html>
